name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: short

jobs:
  rust:
    name: Rust workspace
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Build (native)
        run: cargo build --workspace --all-targets

      - name: Build (wasm32)
        run: cargo build --target wasm32-unknown-unknown -p rsqlite-wasm

      - name: Test
        run: cargo test --workspace

      - name: Clippy (warnings allowed, errors fail)
        run: cargo clippy --workspace --all-targets

  wasm-tests:
    name: WASM-target unit tests
    runs-on: ubuntu-latest
    needs: rust
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Run Node-target tests (lib.rs surface)
        run: wasm-pack test --node crates/rsqlite-wasm

      - name: Run browser-target tests (OPFS / IndexedDB)
        # GitHub-hosted runners ship Chrome by default. The
        # --headless --chrome runner uses chromedriver under the hood.
        run: wasm-pack test --headless --chrome crates/rsqlite-wasm

  coverage-rust:
    name: Rust coverage
    runs-on: ubuntu-latest
    needs: rust
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Run coverage (gate + summary)
        # --fail-under-lines is the gate. Bump as coverage grows;
        # never lower without justification. The rsqlite-wasm crate
        # is excluded here because its tests run under
        # `wasm-pack test` (see the `wasm-tests` job), not native
        # `cargo test`, so cargo-llvm-cov never sees them execute.
        run: |
          cargo llvm-cov --workspace --summary-only \
            --ignore-filename-regex '(_tests\.rs|/tests/|target/|crates/rsqlite-wasm/)' \
            --fail-under-lines 75

      - name: Generate lcov for upload
        if: always()
        run: |
          cargo llvm-cov report --lcov --output-path lcov.info \
            --ignore-filename-regex '(_tests\.rs|/tests/|target/|crates/rsqlite-wasm/)'

      - name: Upload lcov artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rust-coverage-lcov
          path: lcov.info
          if-no-files-found: error

  js:
    name: JS package
    runs-on: ubuntu-latest
    needs: rust
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: js/package-lock.json

      - name: Install JS deps
        working-directory: js
        run: npm ci

      - name: Test JS package (with coverage)
        # Thresholds live in js/vitest.config.ts; vitest exits non-zero
        # if any of them slip below the floor.
        working-directory: js
        run: npm run test:coverage

      - name: Upload JS coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: js-coverage-lcov
          path: js/coverage/lcov.info
          if-no-files-found: ignore

      - name: Build publishable package
        working-directory: js
        run: npm run build

      - name: Verify pack contents
        working-directory: js
        run: npm pack --dry-run
